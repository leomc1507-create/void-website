<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VOID</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 80px;
      letter-spacing: 10px;
    }

    p {
      color: gray;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 60px 20px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      width: 250px;
      height: 300px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>VOID</h1>
  <p>INSIDE OUT</p>
  <button class="btn">SHOP DROP 01</button>
</div>

<div class="section">
  <h2>DROP 01</h2>
  <div class="products">
    <div class="card">PUFFER</div>
    <div class="card">HOODIE</div>
    <div class="card">TEE</div>
  </div>
</div>

<div class="section">
  <h2>LO SIMPLE POR FUERA</h2>
  <h2 style="color: gray;">LO INTENSO POR DENTRO</h2>
</div>

</body>
</html>
